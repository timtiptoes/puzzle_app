<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Puzzle Log — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #7a1942;
      font-family: Georgia, serif;
    }
    .card {
      background: #fff;
      border-radius: 6px;
      padding: 2.5rem 3rem;
      width: 320px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
      text-align: center;
    }
    h1 {
      color: #7a1942;
      font-size: 1.4rem;
      margin-bottom: 1.6rem;
      letter-spacing: 0.03em;
    }
    input[type="password"] {
      width: 100%;
      padding: 0.55rem 0.75rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 1rem;
      font-family: inherit;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: #7a1942;
      box-shadow: 0 0 0 2px rgba(122,25,66,0.2);
    }
    button {
      width: 100%;
      padding: 0.6rem;
      background: #7a1942;
      color: #d4a882;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.04em;
    }
    button:hover { background: #961f51; }
    .error {
      color: #c0392b;
      font-size: 0.9rem;
      margin-bottom: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Puzzle Log</h1>
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post">
      <input type="password" name="password" placeholder="Password" autofocus>
      <button type="submit">Enter</button>
    </form>
  </div>
</body>
</html>
